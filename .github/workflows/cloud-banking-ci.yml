name: Cloud Banking CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Account Service
      run: |
        cd java-services/account-service
        mvn clean package -DskipTests

    - name: Build Transaction Service
      run: |
        cd java-services/transaction-service
        mvn clean package -DskipTests

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Account Service Docker Image
      run: |
        docker build -t snenkosiiiiiii/account-service:latest ./java-services/account-service

    - name: Push Account Service Docker Image
      run: |
        docker push snenkosiiiiiii/account-service:latest

    - name: Build Transaction Service Docker Image
      run: |
        docker build -t snenkosiiiiiii/transaction-service:latest ./java-services/transaction-service

    - name: Push Transaction Service Docker Image
      run: |
        docker push snenkosiiiiiii/transaction-service:latest