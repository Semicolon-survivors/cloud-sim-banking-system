name: Cloud Banking CI Pipeline

on:
  push:
    branches: ["main"]

jobs:

  docker-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Eureka Server Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/eureka-server:latest \
          ./java-services/eureka-server

      - name: Build Account Service Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/account-service:latest \
          ./java-services/account-service

      - name: Build Transaction Service Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/transaction-service:latest \
          ./java-services/transaction-service

      - name: Push Eureka Server Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/eureka-server:latest

      - name: Push Account Service Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/account-service:latest

      - name: Push Transaction Service Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/transaction-service:latest